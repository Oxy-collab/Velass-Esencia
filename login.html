<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velass&Esencia - Acceso</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body class="auth-page">
    <header class="navbar">
        <button id="theme-toggle" class="theme-btn" title="Alternar Modo Oscuro">
            <svg id="moon-icon" viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2"
                fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
        <div class="logo-container">
            <img src="https://cdn.phototourl.com/free/2026-03-25-86eb837e-6f5a-4227-a92e-9e78d32f9aa2.png"
                alt="Velass&Esencia Logo" class="logo-img">
        </div>
        <nav>
            <a href="index.html">Catálogo</a>
        </nav>
    </header>

    <main class="auth-container">
        <div class="auth-card" id="login-card">
            <h2>Iniciar Sesión</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Correo Electrónico</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn primary-btn">Entrar</button>
            </form>
            <p class="toggle-auth">¿No tienes cuenta? <a href="#" id="show-register">Regístrate aquí</a></p>
           
        </div>

        <div class="auth-card" id="register-card" style="display: none;">
            <h2>Registro</h2>
            <form id="register-form">
                <div class="form-group">
                    <label for="reg-name">Nombre Completo</label>
                    <input type="text" id="reg-name" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">Correo Electrónico</label>
                    <input type="email" id="reg-email" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Contraseña</label>
                    <input type="password" id="reg-password" required>
                </div>
                <button type="submit" class="btn primary-btn">Crear Cuenta</button>
            </form>
            <p class="toggle-auth">¿Ya tienes cuenta? <a href="#" id="show-login">Inicia Sesión</a></p>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>

</html>
